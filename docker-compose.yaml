version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: housing_agent_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=housing_agent_db
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  db-data:
